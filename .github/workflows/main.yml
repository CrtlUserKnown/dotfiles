name: Test Install Script

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-install:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up test environment
        run: |
          echo "Setting up test environment..."
          # Clean up any existing configs to simulate fresh install
          rm -rf ~/.config/bat ~/.config/fastfetch ~/.config/ghostty ~/.config/tmux ~/.config/zsh
          rm -f ~/.zshrc ~/.zprofile
          rm -rf ~/.dots

      - name: Make install script executable
        run: chmod +x install.sh

      - name: Run install script
        run: ./install.sh
        env:
          CI: true

      - name: Verify Homebrew installation
        run: |
          if command -v brew &> /dev/null; then
            echo "✅ Homebrew is installed"
            brew --version
          else
            echo "❌ Homebrew installation failed"
            exit 1
          fi

      - name: Verify gum installation
        run: |
          if command -v gum &> /dev/null; then
            echo "✅ Gum is installed"
            gum --version
          else
            echo "❌ Gum installation failed"
            exit 1
          fi

      - name: Verify .config directory
        run: |
          if [ -d ~/.config ]; then
            echo "✅ .config directory exists"
            ls -la ~/.config/
          else
            echo "❌ .config directory not created"
            exit 1
          fi

      - name: Verify dotfiles repository
        run: |
          if [ -d ~/.dots/.git ]; then
            echo "✅ Dotfiles repository cloned"
            ls -la ~/.dots/
          else
            echo "❌ Dotfiles repository not cloned properly"
            exit 1
          fi

      - name: Verify config symlinks
        run: |
          echo "Checking symlinks..."
          all_good=true

          # Check .config symlinks
          for dir in bat fastfetch ghostty tmux zsh; do
            if [ -L ~/.config/$dir ]; then
              target=$(readlink ~/.config/$dir)
              echo "✅ ~/.config/$dir -> $target"
            else
              echo "❌ Missing symlink: ~/.config/$dir"
              all_good=false
            fi
          done

          # Check home directory symlinks
          if [ -L ~/.zshrc ]; then
            target=$(readlink ~/.zshrc)
            echo "✅ ~/.zshrc -> $target"
          else
            echo "❌ Missing symlink: ~/.zshrc"
            all_good=false
          fi

          if [ "$all_good" = false ]; then
            exit 1
          fi

      - name: Verify symlinks point to valid targets
        run: |
          echo "Verifying symlink targets..."
          all_good=true

          for dir in bat fastfetch ghostty tmux zsh; do
            if [ -e ~/.config/$dir ]; then
              echo "✅ ~/.config/$dir points to valid target"
            else
              echo "❌ ~/.config/$dir is a broken symlink"
              all_good=false
            fi
          done

          if [ -e ~/.zshrc ]; then
            echo "✅ ~/.zshrc points to valid target"
          else
            echo "❌ ~/.zshrc is a broken symlink"
            all_good=false
          fi

          if [ "$all_good" = false ]; then
            exit 1
          fi

      - name: Verify .zprofile cleanup
        run: |
          if [ ! -f ~/.zprofile ]; then
            echo "✅ .zprofile was properly cleaned up"
          else
            echo "⚠️ .zprofile still exists (may be expected if brew added it back)"
          fi

      - name: Test Brewfile packages installation
        run: |
          if [ -f "./Brewfile" ]; then
            echo "Checking if Brewfile packages were installed..."
            brew list --formula
            brew list --cask
          else
            echo "⚠️ No Brewfile found to verify"
          fi

      - name: Test idempotency (run script again)
        run: |
          echo "Testing idempotency - running install script again..."
          ./install.sh
          echo "✅ Script can be run multiple times without errors"

      - name: Final verification
        run: |
          echo "=== Final System State ==="
          echo "Homebrew:"
          brew --version
          echo ""
          echo "Config directory:"
          ls -la ~/.config/ || echo "No .config directory"
          echo ""
          echo "Dotfiles:"
          ls -la ~/.dots/ || echo "No .dots directory"
          echo ""
          echo "Home symlinks:"
          ls -la ~/ | grep -E '\.zshrc|\.zprofile' || echo "No relevant files"
          echo ""
          echo "✅ All tests passed!"

  test-without-brewfile:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove Brewfile to test fallback
        run: rm -f Brewfile

      - name: Make install script executable
        run: chmod +x install.sh

      - name: Run install script without Brewfile
        run: ./install.sh
        env:
          CI: true

      - name: Verify installation still works
        run: |
          if [ -d ~/.config ] && [ -d ~/.dots ]; then
            echo "✅ Installation works without Brewfile"
          else
            echo "❌ Installation failed without Brewfile"
            exit 1
          fi
